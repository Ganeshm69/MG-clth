<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | MG Clothing</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --primary: #0f0f0f;
      --accent:  #c9a96e;
    }
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.15);
    }

    /* Password strength bar */
    .strength-bar div {
      height: 4px;
      border-radius: 9999px;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    .split-left {
      background-image: url('https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=900&q=80');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="min-h-screen bg-stone-50">

  <div class="min-h-screen flex">

    <!-- ── Left Panel (image, hidden on mobile) ── -->
    <div class="hidden lg:flex lg:w-1/2 split-left relative">
      <div class="absolute inset-0 bg-black/55"></div>
      <div class="absolute bottom-16 left-12 text-white z-10">
        <h2 class="text-4xl font-black leading-tight">Start your<br/>style story.</h2>
        <p class="text-white/60 mt-3 text-sm">Join thousands of fashion lovers.</p>
      </div>
      <a href="index.html"
         class="absolute top-8 left-8 z-10 text-white text-xl font-black tracking-tighter uppercase"
         style="font-family:'Playfair Display',serif;">
        MG <span style="color:var(--accent)">Clothing</span>
      </a>
    </div>

    <!-- ── Right Panel: Signup Form ── -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto">
      <div class="w-full max-w-md py-8">

        <!-- Mobile logo -->
        <a href="index.html"
           class="block lg:hidden text-2xl font-black tracking-tighter uppercase mb-10 text-center"
           style="font-family:'Playfair Display',serif;">
          MG <span style="color:var(--accent)">Clothing</span>
        </a>

        <!-- Heading -->
        <h1 class="text-3xl font-bold mb-2">Create Account</h1>
        <p class="text-gray-500 text-sm mb-8">
          Already have an account?
          <a href="login.html" class="font-semibold underline underline-offset-2" style="color:var(--accent)">
            Sign In →
          </a>
        </p>

        <!-- ── Error / Success Messages ── -->
        <div id="error-msg"
             class="hidden bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-5">
        </div>
        <div id="success-msg"
             class="hidden bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-xl mb-5">
        </div>

        <!-- ── SIGNUP FORM ── -->
        <form id="signup-form" onsubmit="handleSignup(event)" class="space-y-5">

          <!-- Name: two columns side by side -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
                First Name
              </label>
              <input
                type="text"
                id="firstName"
                placeholder="Meera"
                required
                class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all"
              />
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
                Last Name
              </label>
              <input
                type="text"
                id="lastName"
                placeholder="Gupta"
                required
                class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all"
              />
            </div>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
              Email Address
            </label>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
              class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all"
            />
          </div>

          <!-- Phone (optional) -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
              Phone <span class="normal-case text-gray-400 font-normal">(optional)</span>
            </label>
            <input
              type="tel"
              id="phone"
              placeholder="+91 98765 43210"
              class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all"
            />
          </div>

          <!-- Password with strength meter -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
              Password
            </label>
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="Min. 6 characters"
                required
                oninput="checkStrength()"
                class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all pr-12"
              />
              <button
                type="button"
                onclick="togglePassword('password')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                           -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>

            <!-- Password Strength Indicator (3 coloured bars) -->
            <div class="flex gap-1.5 mt-2 strength-bar">
              <div id="bar1" class="flex-1 bg-gray-200"></div>
              <div id="bar2" class="flex-1 bg-gray-200"></div>
              <div id="bar3" class="flex-1 bg-gray-200"></div>
            </div>
            <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
              Confirm Password
            </label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Repeat your password"
              required
              class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all"
            />
          </div>

          <!-- Terms checkbox -->
          <div class="flex items-start gap-3">
            <input type="checkbox" id="terms" required class="mt-0.5 w-4 h-4 rounded accent-amber-600"/>
            <label for="terms" class="text-sm text-gray-500 leading-relaxed">
              I agree to the
              <a href="#" class="underline underline-offset-2 font-medium" style="color:var(--accent)">Terms of Service</a>
              and
              <a href="#" class="underline underline-offset-2 font-medium" style="color:var(--accent)">Privacy Policy</a>
            </label>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="signup-btn"
            class="w-full py-4 rounded-xl text-white font-semibold text-sm tracking-wide transition-opacity hover:opacity-90"
            style="background:var(--primary)"
          >
            Create Account
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400 uppercase tracking-widest">or</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Google Signup -->
        <button class="w-full py-3.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-700 flex items-center justify-center gap-3 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>

      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       JAVASCRIPT — Signup Logic
       ════════════════════════════════════════ -->
  <script>
    // ── Show/hide password ──────────────────
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // ── Password Strength Checker ───────────
    // Simple logic: checks length and character variety
    function checkStrength() {
      const pw = document.getElementById('password').value;
      const bar1 = document.getElementById('bar1');
      const bar2 = document.getElementById('bar2');
      const bar3 = document.getElementById('bar3');
      const label = document.getElementById('strength-label');

      // Reset bars
      [bar1, bar2, bar3].forEach(b => b.style.backgroundColor = '#e5e7eb');

      let score = 0;
      if (pw.length >= 6)  score++;         // At least 6 chars
      if (pw.length >= 10) score++;         // At least 10 chars
      if (/[^a-zA-Z0-9]/.test(pw)) score++; // Has special character

      const colors = ['#ef4444', '#f59e0b', '#22c55e']; // Red, Yellow, Green
      const labels = ['Weak', 'Fair', 'Strong'];

      if (score >= 1) bar1.style.backgroundColor = colors[score - 1];
      if (score >= 2) bar2.style.backgroundColor = colors[score - 1];
      if (score >= 3) bar3.style.backgroundColor = colors[score - 1];

      label.textContent = pw.length > 0 ? labels[score - 1] || '' : '';
      label.style.color = score > 0 ? colors[score - 1] : '#9ca3af';
    }

    // ── Handle Signup Form Submit ────────────
    // Sends data to the Node.js backend at POST /signup
    async function handleSignup(event) {
      event.preventDefault();

      const btn       = document.getElementById('signup-btn');
      const errorEl   = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      // Collect form values
      const firstName       = document.getElementById('firstName').value.trim();
      const lastName        = document.getElementById('lastName').value.trim();
      const email           = document.getElementById('email').value.trim();
      const phone           = document.getElementById('phone').value.trim();
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Hide old messages
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      // Client-side validation: passwords must match
      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match. Please try again.';
        errorEl.classList.remove('hidden');
        return;
      }

      // Minimum password length check
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.remove('hidden');
        return;
      }

      // Loading state
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        // Send POST request to our backend
        const response = await fetch('http://localhost:3000/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: `${firstName} ${lastName}`,
            email,
            phone,
            password
          })
        });

        const data = await response.json();

        if (response.ok) {
          successEl.textContent = `🎉 Account created! Welcome, ${firstName}. Redirecting to login…`;
          successEl.classList.remove('hidden');
          document.getElementById('signup-form').reset();
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          errorEl.textContent = data.error || 'Signup failed. Please try again.';
          errorEl.classList.remove('hidden');
        }

      } catch (err) {
        errorEl.textContent = 'Could not connect to server. Make sure the backend is running.';
        errorEl.classList.remove('hidden');
      }

      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  </script>

</body>
</html>
