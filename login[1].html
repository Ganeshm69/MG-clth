<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | MG Clothing</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root { --primary: #0f0f0f; --accent: #c9a96e; }
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
    }
    .split-left {
      background-image: url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=900&q=80');
      background-size: cover; background-position: center;
    }
  </style>
</head>
<body class="min-h-screen bg-stone-50">

  <div class="min-h-screen flex">

    <!-- Left: Fashion Image -->
    <div class="hidden lg:flex lg:w-1/2 split-left relative">
      <div class="absolute inset-0 bg-black/50"></div>
      <div class="absolute bottom-16 left-12 text-white z-10">
        <h2 class="text-4xl font-black leading-tight">Welcome back<br/>to your style.</h2>
        <p class="text-white/60 mt-3 text-sm">Sign in and continue your fashion journey.</p>
      </div>
      <a href="index.html"
         class="absolute top-8 left-8 z-10 text-white text-xl font-black tracking-tighter uppercase"
         style="font-family:'Playfair Display',serif;">
        MG <span style="color:var(--accent)">Clothing</span>
      </a>
    </div>

    <!-- Right: Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
      <div class="w-full max-w-md">

        <!-- Mobile logo -->
        <a href="index.html"
           class="block lg:hidden text-2xl font-black tracking-tighter uppercase mb-10 text-center"
           style="font-family:'Playfair Display',serif;">
          MG <span style="color:var(--accent)">Clothing</span>
        </a>

        <h1 class="text-3xl font-bold mb-2">Sign In</h1>
        <p class="text-gray-500 text-sm mb-8">
          Don't have an account?
          <a href="signup.html" class="font-semibold underline underline-offset-2" style="color:var(--accent)">
            Create one →
          </a>
        </p>

        <!-- Error / Success -->
        <div id="error-msg"
             class="hidden bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-5"></div>
        <div id="success-msg"
             class="hidden bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-xl mb-5"></div>

        <!-- Form -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">

          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required
                   class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all"/>
          </div>

          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="text-xs font-semibold uppercase tracking-widest text-gray-500">Password</label>
              <a href="#" class="text-xs underline underline-offset-2" style="color:var(--accent)">Forgot password?</a>
            </div>
            <div class="relative">
              <input type="password" id="password" placeholder="••••••••" required
                     class="form-input w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm bg-white transition-all pr-12"/>
              <button type="button" onclick="togglePw()"
                      class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" class="w-4 h-4 rounded accent-amber-600"/>
            <label for="remember" class="text-sm text-gray-500">Remember me</label>
          </div>

          <button type="submit" id="login-btn"
                  class="w-full py-4 rounded-xl text-white font-semibold text-sm tracking-wide
                         hover:opacity-90 transition-opacity"
                  style="background:var(--primary)">
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400 uppercase tracking-widest">or</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Google (demo) -->
        <button class="w-full py-3.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-700
                       flex items-center justify-center gap-3 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

      </div>
    </div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin(event) {
      event.preventDefault();

      const btn       = document.getElementById('login-btn');
      const errorEl   = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;

      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');
      btn.textContent = 'Signing in…';
      btn.disabled    = true;

      try {
        const response = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // ★ SAVE USER TO sessionStorage so index.html can read it ★
          // This is how the homepage knows the user is logged in.
          sessionStorage.setItem('mgUser', JSON.stringify(data.user));

          successEl.textContent = `Welcome back, ${data.user.name}! Redirecting…`;
          successEl.classList.remove('hidden');

          // Go back to homepage after 1.5 seconds
          setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } else {
          errorEl.textContent = data.error || 'Login failed. Please try again.';
          errorEl.classList.remove('hidden');
        }

      } catch (err) {
        // ─── DEMO MODE (no backend running) ───────────────────────────
        // If the server isn't running, we simulate a login for testing.
        // In production, remove this catch block and keep only the error message.
        console.warn('Backend not available — using demo login.');

        // Demo: accept any email with password "demo123"
        if (password === 'demo123') {
          const demoUser = { id: 99, name: email.split('@')[0], email };
          sessionStorage.setItem('mgUser', JSON.stringify(demoUser));
          successEl.textContent = `Demo login successful! Welcome, ${demoUser.name}. Redirecting…`;
          successEl.classList.remove('hidden');
          setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } else {
          errorEl.textContent = 'Backend not running. For demo: use any email + password "demo123".';
          errorEl.classList.remove('hidden');
        }
      }

      btn.textContent = 'Sign In';
      btn.disabled    = false;
    }
  </script>

</body>
</html>
